<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Vote - Face Verification</title>
    <!-- Face-api.js -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="v-vote.css">
    <link rel="stylesheet" href="../shared/toast.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-header">
        <div class="header-left">
            <h1>Voter Dashboard</h1>
            <p>Welcome, Votername</p>
        </div>
        <a href="../login/login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i>Logout</a>
    </header>

    <main class="container">
        <nav class="tab-nav">
            <a href="v-dashboard.html" class="tab"><i class="fas fa-chart-line"></i> Overview</a>
            <a href="v-vote.html" class="tab active"><i class="fas fa-users"></i> Vote</a>
            <a href="v-result.html" class="tab"><i class="fas fa-building"></i> Results</a>
        </nav>

        <section class="party-list">
            <h3>Party List :</h3>
            <div style="background-color: hsla(93, 100%, 75%, 0.5);" class="stat-card">
                <div>
                    <span class="label">Party Name</span>
                    <h2 class="value">0</h2>
                </div>
                <div class="icon-box green"><i class="fas fa-users"></i></div>
            </div>
            <div style="background-color: hsla(220, 100%, 75%, 0.5);" class="stat-card">
                <div>
                    <span class="label">Party Name</span>
                    <h2 class="value">0</h2>
                </div>
                <div class="icon-box blue"><i class="fas fa-users"></i></div>
            </div>
            <div style="background-color: hsla(51, 100%, 75%, 0.5);" class="stat-card">
                <div>
                    <span class="label">Party Name</span>
                    <h2 class="value">0</h2>
                </div>
                <div class="icon-box orange"><i class="fas fa-users"></i></div>
            </div>
            <div style="background-color: hsla(293, 100%, 75%, 0.5);" class="stat-card">
                <div>
                    <span class="label">Party Name</span>
                    <h2 class="value">0</h2>
                </div>
                <div class="icon-box purple"><i class="fas fa-users"></i></div>
            </div>
            
        </section>

        <section class="stats-grid">
            <div class="vstat-card">
                <div>
                    <h6 class="value">Vote Status</h6>
                    <span class="label"></span>
                    
                </div>
                <div class="icon-box green"><i class="fas fa-check"></i></div>
            </div>
            
        </section>
    </main>

    <!-- Face-api models handled in JS file -->
    <script src="../shared/toast.js"></script>
    <script src="v-vote.js"></script>

</body>
</html>
