<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Dashboard</title>
    <link rel="stylesheet" href="v-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="top-header">
        <div class="header-left">
            <h1>Voter Dashboard</h1>
            <p>Welcome, Votername</p>
        </div>
        <a href="../login/login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i>Logout</a>
    </header>

    <main class="container">
        <nav class="tab-nav">
            <a href="../voter-dashboard/v-dashboard.html" id="dashboardactive" class="tab active"><i class="fas fa-chart-line"></i> Overview</a>
            <a href="../voter-dashboard/v-vote.html" class="tab"><i class="fas fa-users"></i> Vote</a>
            <a href="../voter-dashboard/v-result.html" class="tab"><i class="fas fa-building"></i> Results</a>
        </nav>

        <section class="personal-info">
            <h3>Personal Information</h3>
            <div class="list-item">
                <div class="list-info">
                    <strong>Name:</strong>
                </div>
            </div>
            <div class="list-item">
                <div class="list-info">
                    <strong>Age:</strong>
                </div>
            </div>
            <div class="list-item">
                <div class="list-info">
                    <strong>DOB:</strong>
                </div>
            </div>
            <div class="list-item">
                <div class="list-info">
                    <strong>Voter ID:</strong>
                </div>
            </div>
            
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <div>
                    <h6 class="value">Vote Status</h6>
                    <span class="label"></span>
                    
                </div>
                <div class="icon-box green"><i class="fas fa-check"></i></div>
            </div>
            
        </section>
    </main>

    <script src="v-dashboard.js"></script>

</body>
</html>
