<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Results</title>
    <link rel="stylesheet" href="results.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <h1>Admin Dashboard</h1>
            <p>Welcome, System Administrator</p>
        </div>
        <a href="../../login/login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </header>

    <main class="container">
        <nav class="tab-nav">
            <a href="../../admin/dashboard/dashboard.html" class="tab"><i class="fas fa-chart-line"></i> Overview</a>
            <a href="../../admin/voters/voters.html" class="tab"><i class="fas fa-users"></i> Voters (0)</a>
            <a href="../../admin/parties/parties.html" class="tab"><i class="fas fa-building"></i> Parties (0)</a>
            <a href="../../admin/results/results.html" class="tab active"><i class="fas fa-poll"></i> Results</a>
            <a href="../../admin/register-voter/register-voter.html" class="tab"><i class="fas fa-user-plus"></i> Register Voter</a>
            <a href="../../admin/register-party/register-party.html" class="tab"><i class="fas fa-plus"></i> Register Party</a>
        </nav>

        <section class="party-list">
            <h3>Results :</h3>
            <div style="background-color: hsla(93, 100%, 75%, 0.5);" class="stat-card">
                <div>
                    <span class="label">Party Name</span>
                    <h2 class="value">0</h2>
                </div>
                <div class="icon-box green"><i class="fas fa-users"></i></div>
            </div>
            <div style="background-color: hsla(220, 100%, 75%, 0.5);" class="stat-card">
                <div>
                    <span class="label">Party Name</span>
                    <h2 class="value">0</h2>
                </div>
                <div class="icon-box blue"><i class="fas fa-users"></i></div>
            </div>
            <div style="background-color: hsla(51, 100%, 75%, 0.5);" class="stat-card">
                <div>
                    <span class="label">Party Name</span>
                    <h2 class="value">0</h2>
                </div>
                <div class="icon-box orange"><i class="fas fa-users"></i></div>
            </div>
            <div style="background-color: hsla(293, 100%, 75%, 0.5);" class="stat-card">
                <div>
                    <span class="label">Party Name</span>
                    <h2 class="value">0</h2>
                </div>
                <div class="icon-box purple"><i class="fas fa-users"></i></div>
            </div>
        </section>
    </main>

    <script src="results.js"></script>
</body>
</html>
