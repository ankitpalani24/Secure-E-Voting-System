<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Voter Registration</title>
    <!-- Face-api.js -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="register-voter.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header class="top-header">
        <div class="header-left">
            <h1>Admin Dashboard</h1>
            <p>Welcome, System Administrator</p>
        </div>
        <a href="../../login/login.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </header>

    <main class="container">
        <nav class="tab-nav">
            <a href="../../admin/dashboard/dashboard.html" class="tab"><i class="fas fa-chart-line"></i>
                Overview</a>
            <a href="../../admin/voters/voters.html" class="tab"><i class="fas fa-users"></i> Voters (0)</a>
            <a href="../../admin/parties/parties.html" class="tab"><i class="fas fa-building"></i> Parties
                (0)</a>
            <a href="../../admin/results/results.html" class="tab"><i class="fas fa-poll"></i> Results</a>
            <a href="../../admin/register-voter/register-voter.html" class="tab active"><i class="fas fa-user-plus"></i>
                Register Voter</a>
            <a href="../../admin/register-party/register-party.html" class="tab"><i class="fas fa-plus"></i>
                Register Party</a>
        </nav>

        <section class="stats-grid">
            <div class="stat-card">
                <div>
                    <h2 class="value">Add New Voter</h2>
                </div>
                <button class="icon-box green"><i class="fas fa-user-plus"></i></button>
            </div>
        </section>

        <div id="addvoter" class="hidden">
            <div class="stat-card">
                <div class="regvoter">
                    <div class="card">
                        <div class="title">
                            <span class="icon">👤+</span>
                            <h2>Register New Voter</h2>
                        </div>

                        <form id="registerForm">
                            <div class="form-grid">

                                <div class="form-group">
                                    <label>Full Name</label>
                                    <input type="text" id="fullName" placeholder="Enter full name" required>
                                </div>

                                <div class="form-group">
                                    <label>Voter ID Number</label>
                                    <input type="text" id="voterId" placeholder="Enter voter ID number" required>
                                </div>

                                <div class="form-group">
                                    <label>User ID</label>
                                    <input type="text" id="email"
                                        placeholder="Enter only name (Auto Generating name@voter) " required>
                                </div>

                                <div class="form-group">
                                    <label>Password</label>
                                    <input type="password" id="password" placeholder="Enter password" required>
                                </div>

                                <div class="form-group">
                                    <label>Date of Birth</label>
                                    <input type="date" id="dob" required>
                                </div>

                                <div class="form-group">
                                    <label>Address</label>
                                    <input type="text" id="address" placeholder="Enter your address" required>
                                </div>

                            </div>

                            <div class="button-group">
                                <button type="button" class="cancel-btn">Cancel</button>
                                <button type="submit" class="submit-btn">
                                    Continue to Face Registration
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>




    </main>

    <!-- Face-api models handled in JS file -->
    <script src="register-voter.js"></script>

</body>

</html>
